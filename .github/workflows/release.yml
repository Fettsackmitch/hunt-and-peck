name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src\HuntAndPeck\HuntAndPeck.csproj
          -c Release
          -r win-x64
          --no-self-contained
          -p:Version=${{ steps.version.outputs.version }}
          -o publish\

      - name: Create ZIP
        run: Compress-Archive -Path publish\* -DestinationPath HuntAndPeck-${{ github.event.release.tag_name }}-win-x64.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: HuntAndPeck-${{ github.event.release.tag_name }}-win-x64.zip
