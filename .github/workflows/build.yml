name: Build & Test

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src\HuntAndPeck.slnx -c Release

      - name: Test
        run: dotnet test src\HuntAndPeck.Tests\HuntAndPeck.Tests.csproj -c Release --no-build
